name: Grafana datasource & token

# Grafana 자체 배포(Helm/PVC/ingress/admin secret)는 Terraform이 담당.
# 이 워크플로는 배포 후 datasource 프로비저닝(Secret+sidecar) + management-snapshot 토큰 발급만 수행.
# 전제: Terraform apply로 grafana가 이미 떠 있어야 함(port-forward/토큰 발급 대상).

on:
  workflow_dispatch:
  push:
    branches: [main, feat/ci]
    paths:
      - 'k8s/grafana/**'
      - 'provisioning/datasources/**'

jobs:
  grafana-config:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name sigma-eks-cluster \
            --region ap-northeast-2

      - name: Provision datasource & issue token
        env:
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          # datasource ${...} 치환용. AWS_ACCESS_KEY_ID/SECRET/REGION 은 configure-aws-credentials 가
          # 이미 job env로 export → 스크립트가 상속. 버킷명만 명시 주입.
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: bash k8s/grafana/setup-grafana-secret.sh
