# .github/workflows/ci.yml  ← 각 서비스 repo에 이 파일을 복사해서 사용
#
# [필수 수정 항목]
#   1. uses 경로의 `your-org`  → 실제 GitHub organization 이름
#   2. service-name            → 이 서비스의 고유 이름
#   3. language                → 아래 중 하나 선택: node | python | go | java
#   4. <language>-version      → 선택한 언어의 버전 input 하나만 남기고 나머지 삭제
#   5. ECR 사용 시 vars.ECR_REGISTRY → with.ecr-registry 로 전달 (Variables에서 관리, Secrets 아님)
#      GHCR 등 ECR 외 레지스트리는 with.docker-registry 사용
#
# [언어별 버전 input 대응표]
#   language: node   → node-version:   "20.x"
#   language: python → python-version: "3.11"
#   language: go     → go-version:     "1.22"
#   language: java   → java-version:   "21"  + java-distribution: "temurin"

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    uses: 404-Factory/.github/.github/workflows/reusable-build.yml@dev
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    with:
      # service-name 생략 시 repo 이름 자동 사용
      use-ecr: true
      aws-region: ap-northeast-2
      ecr-registry: ${{ vars.ECR_REGISTRY }}
      java-version: "17"
      pre-build-command: "./gradlew build -x test --no-daemon"
      # 아래는 기본값과 다를 때만 명시
      # build-context: .
      # dockerfile: Dockerfile
      # platforms: linux/amd64,linux/arm64
      # severity: HIGH,CRITICAL
      # sign-image: true
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      gpr-token: ${{ secrets.GPR_TOKEN }}
