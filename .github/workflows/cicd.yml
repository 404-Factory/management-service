name: CI/CD

on:
  # Manual trigger: needed to (re)deploy manifest-only changes, since k8s/** is
  # path-ignored below and therefore never auto-triggers build+deploy.
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'k8s/**'
      - '**.md'
      - '.github/workflows/deploy-connector.yml'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'k8s/**'
      - '**.md'
      - '.github/workflows/deploy-connector.yml'

jobs:
  build:
    uses: 404-Factory/.github/.github/workflows/reusable-build.yml@dev
    permissions:
      contents: read
      packages: write
    with:
      use-ecr: true
      aws-region: ap-northeast-2
      ecr-registry: ${{ vars.ECR_REGISTRY }}
      platforms: ${{ vars.PLATFORM }}   # 레포/조직 Variables에서 관리 (예: linux/arm64)
      java-version: "17"
      pre-build-command: "./gradlew build -x test --no-daemon"
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      gpr-token: ${{ secrets.GPR_TOKEN }}

  deploy:
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    uses: 404-Factory/.github/.github/workflows/reusable-deploy.yml@dev
    permissions:
      contents: read
    with:
      eks-cluster-name: sigma-eks-cluster
      deploy-environment: production
      aws-region: ap-northeast-2
      namespace: management
      image: ${{ needs.build.outputs.image }}
      image-tag: ${{ needs.build.outputs.tag }}
      manifest-dir: k8s/app
    secrets:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}