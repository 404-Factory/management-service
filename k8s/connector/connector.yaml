apiVersion: kafka.strimzi.io/v1
kind: KafkaConnector
metadata:
  name: management-outbox-connector
  namespace: kafka-dev
  labels:
    strimzi.io/cluster: debezium-connect-cluster
spec:
  class: io.debezium.connector.mariadb.MariaDbConnector
  tasksMax: 1
  config:
    database.hostname: ${env:DB_HOST}
    database.port: "3306"
    database.user: ${env:DEBEZIUM_USERNAME}
    database.password: ${env:DEBEZIUM_PASSWORD}
    database.ssl.mode: "trust"
    database.server.id: "1002"
    topic.prefix: management

    database.include.list: management_db
    table.include.list: management_db.outbox

    snapshot.mode: "initial"
    snapshot.fetch.size: "100"
    snapshot.max.threads: "1"
    snapshot.min.row.count.to.stream.results: "1"

    schema.history.internal.kafka.bootstrap.servers: sigma-kafka-kafka-bootstrap.default.svc.cluster.local:9092
    schema.history.internal.kafka.topic: management-schema-history
    schema.history.internal.store.only.captured.tables.ddl: "true"
    schema.history.internal.skip.unparseable.ddl: "true"

    transforms: outbox
    transforms.outbox.type: io.debezium.transforms.outbox.EventRouter
    transforms.outbox.table.op.invalid.behavior: "fatal"
    transforms.outbox.table.field.event.id: "id"
    transforms.outbox.table.field.event.key: "aggregate_id"
    transforms.outbox.table.field.event.payload: "payload"
    transforms.outbox.table.fields.additional.placement: "event_type:header:eventType"
    transforms.outbox.route.by.field: event_type
    transforms.outbox.route.topic.replacement: management.${routedByValue}

    key.converter.schemas.enable: "false"
    value.converter.schemas.enable: "false"

    max.batch.size: "512"
    max.queue.size: "2048"

    errors.tolerance: "all"
    errors.log.enable: "true"
    errors.log.include.messages: "false"
    errors.retry.timeout: "0"
    errors.retry.delay.max.ms: "60000"
    errors.deadletterqueue.topic.name: management-dlq
    errors.deadletterqueue.topic.replication.factor: "1"
    errors.deadletterqueue.context.headers.enable: "true"