# Grafana (Athena 데이터소스, 임베딩/익명조회) — management-service가 스냅샷 생성에 사용.
# Dockerfile.grafana의 GF_* 설정을 별도 이미지 빌드 없이 Deployment env로 옮긴 형태.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: management
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin_user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin_password
            - name: GF_INSTALL_PLUGINS
              value: "grafana-athena-datasource"
            - name: GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
              value: "grafana-athena-datasource"
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_DEFAULT_APP_MODE
              value: "development"
            # /grafana sub-path 서빙 (ALB ingress의 /grafana 경로와 정합).
            # host는 박지 않음 → ALB DNS가 바뀌어도 무관. 스냅샷 URL은 프론트가 현재 host 기준으로 조립.
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            # 영속성: emptyDir 대신 기존 RDS(MariaDB)를 Grafana 외부 DB 백엔드로 사용.
            # user/password/host는 기존 rdb-secret 재사용, DB(schema)만 별도(grafana).
            - name: GF_DATABASE_TYPE
              value: "mysql"
            - name: GF_DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: rdb-secret
                  key: DB_HOST
            - name: GF_DATABASE_NAME
              value: "grafana"
            - name: GF_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: rdb-secret
                  key: DB_USERNAME
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rdb-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /grafana/api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30   # 플러그인 설치 포함 최대 ~160초 대기
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        # grafana 상태(대시보드/데이터소스/스냅샷/SA토큰)는 외부 RDS(GF_DATABASE_*)에 저장되므로 영속성 OK.
        # /var/lib/grafana(emptyDir)엔 플러그인/렌더 캐시만 남고, 재시작 시 플러그인은 자동 재설치됨 → PVC 불필요.
        - name: grafana-data
          emptyDir: {}
        # - name: grafana-data
        #   persistentVolumeClaim:
        #     claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: management
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
# A안(EBS CSI 드라이버 설치) 복귀 시 아래 PVC 주석 해제하고 Deployment volumes도 PVC로 되돌릴 것.
