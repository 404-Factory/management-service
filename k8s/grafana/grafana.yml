# Grafana (Athena 데이터소스, 임베딩/익명조회) — management-service가 스냅샷 생성에 사용.
# Dockerfile.grafana의 GF_* 설정을 별도 이미지 빌드 없이 Deployment env로 옮긴 형태.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: management
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin_user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin_password
            - name: GF_INSTALL_PLUGINS
              value: "grafana-athena-datasource"
            - name: GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS
              value: "grafana-athena-datasource"
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_DEFAULT_APP_MODE
              value: "development"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        # 임시: EBS CSI 드라이버 미설치로 emptyDir 사용. 드라이버 설치 후 아래 PVC 블록으로 복귀할 것.
        # 주의: emptyDir는 pod 재시작 시 grafana DB(SA 토큰 포함)가 날아감 → 토큰 재발급 필요.
        - name: grafana-data
          emptyDir: {}
        # - name: grafana-data
        #   persistentVolumeClaim:
        #     claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: management
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
# A안(EBS CSI 드라이버 설치) 복귀 시 아래 PVC 주석 해제하고 Deployment volumes도 PVC로 되돌릴 것.
