apiVersion: apps/v1
kind: Deployment
metadata:
  name: management-service
  namespace: management
  labels:
    app: management-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: management-service
  template:
    metadata:
      labels:
        app: management-service
    spec:
      containers:
        - name: management-service
          image: $IMAGE:$IMAGE_TAG
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: s3-secret
            - secretRef:
                name: rdb-secret
          env:
            - name: DB_PORT
              value: "3306"
            - name: DB_MAX_POOL_SIZE
              value: "5"
            - name: DB_MIN_IDLE
              value: "2"
            - name: SERVER_PORT
              value: "8080"
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      restartPolicy: Always
